services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    env_file:
      - path: .env
        required: false
    ports:
      - "3808:3808" # Host 3808 -> Container 3808
    volumes:
      - ./agents:/app/agents
      - ./agent_personas:/app/agent_personas
      - ./config:/app/config
      - ./config.json:/app/config.json.legacy
      - ./.openkiwi.key:/app/.openkiwi.key
      - ./sessions:/app/sessions
      - ./tools:/app/tools
      - ./workspace:/app/workspace
      - ./logs:/app/logs
      - ./LATEST_RELEASE.txt:/app/LATEST_RELEASE.txt
    restart: unless-stopped

  gateway-ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    ports:
      - "3000:80" # Host 3000 -> UI Nginx 80
    restart: unless-stopped
